<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Landing Page Vòng Trầm</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex: 1; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 14px; color: #666; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #ee4d2d; margin-top: 10px; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: 600; font-size: 14px; }
        td { font-size: 14px; }
        .btn-export { background: #107c41; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; float: right; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard Đơn Hàng</h1>
        
        <div class="stats">
            <div class="stat-card"><h3>Tổng đơn</h3><div class="value" id="total-orders">0</div></div>
            <div class="stat-card"><h3>Đơn hôm nay</h3><div class="value" id="today-orders">0</div></div>
            <div class="stat-card"><h3>Doanh thu tạm tính</h3><div class="value" id="total-revenue">0đ</div></div>
        </div>

        <div>
            <button class="btn-export" onclick="exportExcel()">Xuất Excel</button>
            <h2 style="font-size: 18px; margin-bottom: 15px;">Đơn hàng mới nhất (Demo LocalStorage)</h2>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Thời gian</th>
                    <th>Khách hàng</th>
                    <th>SĐT</th>
                    <th>Địa chỉ</th>
                    <th>Sản phẩm</th>
                    <th>SL</th>
                </tr>
            </thead>
            <tbody id="order-table-body">
                </tbody>
        </table>
    </div>

    <script>
        function loadAdmin() {
            const orders = JSON.parse(localStorage.getItem('mockOrders') || '[]');
            document.getElementById('total-orders').innerText = orders.length;
            document.getElementById('today-orders').innerText = orders.length; // mock
            
            let revenue = 0;
            const tbody = document.getElementById('order-table-body');
            tbody.innerHTML = '';
            
            orders.reverse().forEach(o => {
                revenue += (o.price * o.quantity);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${o.time || 'Vừa xong'}</td>
                    <td>${o.name}</td>
                    <td>${o.phone}</td>
                    <td>${o.address}, ${o.ward}, ${o.district}, ${o.province}</td>
                    <td>${o.product}</td>
                    <td>${o.quantity}</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById('total-revenue').innerText = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(revenue);
            
            if(orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Chưa có đơn hàng nào. Đặt hàng bên Landing Page để xem dữ liệu tại đây.</td></tr>';
            }
        }
        
        function exportExcel() {
            alert("Chức năng xuất Excel yêu cầu thư viện (VD: SheetJS) hoặc chạy trên Server thực tế. Trên Google Sheets đã có sẵn file Excel.");
        }

        window.onload = loadAdmin;
    </script>
</body>
</html>
